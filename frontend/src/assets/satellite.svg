<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Solar panel left -->
  <rect x="4" y="24" width="20" height="16" rx="2" fill="#1a2a4a" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
  <line x1="12" y1="24" x2="12" y2="40" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="18" y1="24" x2="18" y2="40" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="4" y1="30" x2="24" y2="30" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="4" y1="36" x2="24" y2="36" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
  <!-- Solar panel right -->
  <rect x="40" y="24" width="20" height="16" rx="2" fill="#1a2a4a" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
  <line x1="46" y1="24" x2="46" y2="40" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="52" y1="24" x2="52" y2="40" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="40" y1="30" x2="60" y2="30" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="40" y1="36" x2="60" y2="36" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
  <!-- Body -->
  <rect x="24" y="22" width="16" height="20" rx="3" fill="#0d1025" stroke="#00e5ff" stroke-width="2"/>
  <!-- Antenna -->
  <line x1="32" y1="10" x2="32" y2="22" stroke="#00e5ff" stroke-width="1.5"/>
  <circle cx="32" cy="8" r="3" fill="none" stroke="#00e5ff" stroke-width="1.5"/>
  <circle cx="32" cy="8" r="1" fill="#00e5ff"/>
  <!-- Dish -->
  <path d="M28 46 Q32 50 36 46" fill="none" stroke="#00e5ff" stroke-width="1.5"/>
  <line x1="32" y1="42" x2="32" y2="48" stroke="#00e5ff" stroke-width="1"/>
  <!-- Signal -->
  <path d="M38 12 Q42 8 38 4" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.5"/>
  <path d="M40 14 Q46 8 40 2" fill="none" stroke="#00e5ff" stroke-width="0.6" opacity="0.3"/>
</svg>
